# StorageClass GP3 para EKS — substitui local-path do kind
# Requer o add-on aws-ebs-csi-driver (já configurado no cluster.yaml)
#
# Aplicar:
#   kubectl --context eks-tipsbank apply -f k8s/eks/storageclass-gp3.yaml
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
