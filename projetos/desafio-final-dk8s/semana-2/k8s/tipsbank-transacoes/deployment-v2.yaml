# Deployment da api-transacoes v2 — destino do Canary (10% do tráfego)
# Build e push da imagem v2 antes de aplicar:
#   REGISTRY=wisomar TAG=v2.0.0 bash scripts/build-v2.sh
#
# Rollback: kubectl rollout undo deployment/api-transacoes-v2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-transacoes-v2
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes
    version: v2
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: api-transacoes
      version: v2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-transacoes
        version: v2
    spec:
      containers:
      - name: api-transacoes
        image: wisomar/tipsbank-api-transacoes:v2.0.0
        ports:
        - containerPort: 8080
        env:
        - name: APP_VERSION
          value: v2
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials-transacoes
              key: DB_URL
        - name: CONTAS_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONTAS_URL
        - name: AUDITORIA_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: AUDITORIA_URL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          periodSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8080
          failureThreshold: 30
          periodSeconds: 5
      - name: log-forwarder
        image: busybox:1.36
        command: ["sh", "-c", "tail -F /var/log/app/app.log 2>/dev/null || sleep infinity"]
        volumeMounts:
        - name: log-vol
          mountPath: /var/log/app
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
      volumes:
      - name: log-vol
        emptyDir: {}
