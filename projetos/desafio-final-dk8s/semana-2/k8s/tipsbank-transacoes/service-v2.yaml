# Service para o Deployment v2 — referenciado pelo Ingress canary
apiVersion: v1
kind: Service
metadata:
  name: api-transacoes-v2
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes
    version: v2
spec:
  selector:
    app: api-transacoes
    version: v2
  ports:
  - name: http
    port: 8080
    targetPort: 8080
