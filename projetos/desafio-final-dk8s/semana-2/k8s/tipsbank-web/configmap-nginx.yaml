# nginx.conf atualizado com FQDNs inter-namespace do Kubernetes.
# Monte no Deployment de web em /etc/nginx/nginx.conf:
#
#   volumes:
#   - name: nginx-config
#     configMap:
#       name: nginx-config
#   containers:
#   - name: web
#     volumeMounts:
#     - name: nginx-config
#       mountPath: /etc/nginx/nginx.conf
#       subPath: nginx.conf
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: tipsbank-web
data:
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;

      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;

      # FQDNs inter-namespace — resolvidos pelo CoreDNS do cluster
      upstream contas     { server api-contas.tipsbank-contas.svc.cluster.local:8080; }
      upstream transacoes { server api-transacoes.tipsbank-transacoes.svc.cluster.local:8080; }
      upstream auditoria  { server auditoria.tipsbank-auditoria.svc.cluster.local:8080; }

      server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
          access_log off;
          return 200 "ok\n";
        }

        location /api/contas/ {
          proxy_pass         http://contas/;
          proxy_http_version 1.1;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/transacoes/ {
          proxy_pass         http://transacoes/;
          proxy_http_version 1.1;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auditoria/ {
          proxy_pass         http://auditoria/;
          proxy_http_version 1.1;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
          try_files $uri $uri/ /index.html;
        }
      }
    }
