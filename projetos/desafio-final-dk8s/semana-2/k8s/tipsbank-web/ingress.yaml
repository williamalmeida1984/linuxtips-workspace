# Ingress do frontend SPA — app.tipsbank.local
# Rate limit: 50 req/s por IP (proteção de entrada global)
# TLS: cert-manager gera e renova o certificado automaticamente
#
# Pré-requisito: Ingress Nginx Controller instalado
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     -n ingress-nginx --create-namespace
#
# Adicione ao /etc/hosts (IP do LoadBalancer/NodePort do controller):
#   <IP-DO-CONTROLLER> app.tipsbank.local api.tipsbank.local grafana.tipsbank.local locust.tipsbank.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: tipsbank-web
  annotations:
    cert-manager.io/cluster-issuer: tipsbank-ca-issuer
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - app.tipsbank.local
    secretName: tipsbank-web-tls
  rules:
  - host: app.tipsbank.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 8080
