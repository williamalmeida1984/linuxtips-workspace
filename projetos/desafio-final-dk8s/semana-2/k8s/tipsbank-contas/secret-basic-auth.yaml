# Secret com htpasswd para Basic Auth na rota /contas/admin
#
# Gere o valor do campo 'auth' com:
#   htpasswd -nb admin tipsbank | base64
# E substitua o placeholder abaixo pelo valor gerado.
#
# Alternativa — criar direto com kubectl:
#   htpasswd -cb /tmp/auth admin tipsbank
#   kubectl create secret generic basic-auth \
#     --from-file=auth=/tmp/auth \
#     -n tipsbank-contas
#   rm /tmp/auth
#
# O valor abaixo é: admin:$apr1$... (admin / tipsbank) — TROQUE em produção
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth
  namespace: tipsbank-contas
type: Opaque
data:
  # echo "admin:$(openssl passwd -apr1 tipsbank)" | base64
  # Substitua pelo valor gerado no seu ambiente — nunca comite senhas reais
  auth: YWRtaW46JGFwcjEkQXBuWE1nbkQkWHBKLjcyNy92ZlZCTVB3SDZpbW9aMQo=
