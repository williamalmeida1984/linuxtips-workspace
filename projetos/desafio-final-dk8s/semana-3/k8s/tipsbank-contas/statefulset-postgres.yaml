apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: tipsbank-contas
  labels:
    app: postgres
    team: banking
    env: production
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: tipsbank-contas
  labels:
    app: postgres
    team: banking
    env: production
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        team: banking
        env: production
        role: primary
    spec:
      tolerations:
        - key: compliance
          operator: Equal
          value: strict
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
                  role: replica
              topologyKey: kubernetes.io/hostname
      containers:
        - name: postgres
          image: postgres:15
          envFrom:
            - secretRef:
                name: db-credentials
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tipsbank", "-d", "tipsbank"]
            periodSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 15
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tipsbank", "-d", "tipsbank"]
            periodSeconds: 5
            failureThreshold: 3
            initialDelaySeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
# postgres-replica: StatefulSet separado em node diferente (requiredDuringScheduling + AntiAffinity com o primary)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: tipsbank-contas
  labels:
    app: postgres
    team: banking
    env: production
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: replica
  template:
    metadata:
      labels:
        app: postgres
        team: banking
        env: production
        role: replica
    spec:
      tolerations:
        - key: compliance
          operator: Equal
          value: strict
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
                  role: primary
              topologyKey: kubernetes.io/hostname
      containers:
        - name: postgres
          image: postgres:15
          envFrom:
            - secretRef:
                name: db-credentials
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tipsbank", "-d", "tipsbank"]
            periodSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 15
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tipsbank", "-d", "tipsbank"]
            periodSeconds: 5
            failureThreshold: 3
            initialDelaySeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes: []
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
