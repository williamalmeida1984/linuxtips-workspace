apiVersion: v1
kind: Service
metadata:
  name: api-transacoes
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes
    team: banking
    env: production
spec:
  selector:
    app: api-transacoes
    version: v1
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-transacoes
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes
    team: banking
    env: production
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: api-transacoes
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-transacoes
        team: banking
        env: production
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-transacoes
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: app-logs
          emptyDir: {}
      containers:
        - name: app
          image: wisomar/tipsbank-api-transacoes:v1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "v1"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_URL
            - name: CONTAS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CONTAS_URL
            - name: AUDITORIA_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUDITORIA_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
        - name: log-forwarder
          image: busybox:1.36
          command: ["sh", "-c", "tail -F /var/log/app/app.log 2>/dev/null || (while true; do sleep 5; done)"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
