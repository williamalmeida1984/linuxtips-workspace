apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-logger
  namespace: tipsbank-monitoring
  labels:
    app: node-logger
    team: banking
    env: production
spec:
  selector:
    matchLabels:
      app: node-logger
  template:
    metadata:
      labels:
        app: node-logger
        team: banking
        env: production
    spec:
      tolerations:
        - key: compliance
          operator: Equal
          value: strict
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
        - name: node-logger
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"node\":\"$NODE_NAME\",\"disk\":\"$(df -h / | tail -1 | awk '{print $5}')\",\"uptime\":\"$(cat /proc/uptime | awk '{print $1}')s\"}"
                sleep 30
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 20m
              memory: 32Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
